# Homeostatic Transformer (HoT) — synthetic bracket-matching, tiny config.
# Fast smoke-test config: runs to completion in a few minutes on CPU,
# and under 2 minutes on a T4 GPU in Colab.

run_name: synthetic_tiny

model:
  d_model: 64
  n_layers: 4
  n_heads: 4
  conv_kernel_size: 7
  dropout: 0.1
  gate_temperature: 0.05     # sigmoid sharpness for soft routing during training

data:
  dataset: synthetic_bracket  # built-in task, no external download required
  seq_len: 64
  batch_size: 32
  vocab_size: 4               # 0='(', 1=')', 2-3 unused (safe margin)
  n_classes: 2
  seed: 42

training:
  steps: 10000
  lr: 0.001
  weight_decay: 0.01
  grad_clip: 1.0
  eval_every: 500
  save_dir: runs/

czu:
  warmup_steps: 1000          # force Path C for first 1000 steps, collect entropy stats
  update_every: 500           # EMA threshold update interval (steps)
  ema_beta: 0.95              # EMA decay for threshold updates (higher = slower drift)
  # Hard bounds that prevent thresholds from saturating near 0 or 1
  # regardless of the warmup entropy distribution.
  h_low_clamp_min: 0.2        # H_low will never drop below this
  h_low_clamp_max: 0.75       # H_low will never exceed this
  h_high_clamp_min: 0.35      # H_high will never drop below this
  h_high_clamp_max: 0.90      # H_high will never exceed this (key: keeps H_high < 1)
  # Gradual schedule: over this many post-warmup steps the thresholds are
  # linearly interpolated from their initial values toward the learned values,
  # avoiding a sudden jump that would otherwise destabilise routing.
  schedule_steps: 2000

routing_reg:
  # Load-balancing loss: KL divergence of mean routing weights to target_dist.
  # Prevents collapse to always-C and encourages use of all three paths.
  lambda_balance: 0.05
  # Compute-cost penalty: directly penalises Path C (O(N²) attention) usage.
  lambda_compute: 0.02
  # Target routing distribution [frac_A, frac_B, frac_C].
  # The default asks for roughly equal use of all three paths.
  # Increase frac_A/frac_B (and decrease frac_C) to push for more compute savings.
  target_dist: [0.33, 0.34, 0.33]

logging:
  log_every: 100
